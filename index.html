<!doctype html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="/roomate/" />
    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="A new Flutter project." />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="roommates" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>roommates</title>
    <link rel="manifest" href="manifest.json" />

    <meta
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
      name="viewport"
    />
    <style id="splash-screen-style">
      html {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100%;
        background-color: #00a884;
        background-size: 100% 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .center {
        margin: 0;
        position: absolute;
        top: 50%;
        left: 50%;
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
      }

      .contain {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .stretch {
        display: block;
        width: 100%;
        height: 100%;
      }

      .cover {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .bottom {
        position: absolute;
        bottom: 0;
        left: 50%;
        -ms-transform: translate(-50%, 0);
        transform: translate(-50%, 0);
      }

      .bottomLeft {
        position: absolute;
        bottom: 0;
        left: 0;
      }

      .bottomRight {
        position: absolute;
        bottom: 0;
        right: 0;
      }

      #splash-branding {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
      }

      #splash {
        width: min(46vw, 220px);
        max-width: 220px;
        min-width: 120px;
      }

      #splash img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 24px;
        animation: splash-pulse 1.8s ease-in-out infinite;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.2);
      }

      .splash-loader {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .splash-loader span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.85);
        animation: splash-bounce 1.2s infinite ease-in-out;
      }

      .splash-loader span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .splash-loader span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes splash-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.02);
          opacity: 0.92;
        }
      }

      @keyframes splash-bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #splash img,
        .splash-loader span {
          animation: none;
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0b141a;
        }

        #splash img {
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
        }
      }
    </style>
    <script id="splash-screen-script">
      function removeSplashFromWeb() {
        document.getElementById("splash")?.remove();
        document.getElementById("splash-branding")?.remove();
        document.body.style.background = "transparent";
      }
    </script>
  </head>
  <body>
    <div id="splash-branding" aria-hidden="true">
      <picture id="splash">
        <source
          srcset="
            splash/img/light-1x.png 1x,
            splash/img/light-2x.png 2x,
            splash/img/light-3x.png 3x,
            splash/img/light-4x.png 4x
          "
          media="(prefers-color-scheme: light)"
        />
        <source
          srcset="
            splash/img/dark-1x.png 1x,
            splash/img/dark-2x.png 2x,
            splash/img/dark-3x.png 3x,
            splash/img/dark-4x.png 4x
          "
          media="(prefers-color-scheme: dark)"
        />
        <img src="splash/img/light-1x.png" alt="" />
      </picture>
      <div class="splash-loader">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <script src="flutter_bootstrap.js" async=""></script>
  </body>
</html>
